<!DOCTYPE html>
<html>
  <head>
    <style>
      .error {
        color: red;
        display: none;
      }
    </style>
  </head>
  <body>
    <fieldset class="homey-form-fieldset">
      <legend class="homey-form-legend">OSAIO</legend>
      <br>
      <div class="homey-form-group">
        <label class="homey-form-label" for="email" data-i18n="pair.email">Email</label>
        <input class="homey-form-input" id="email" type="text" value="" />
        <p id="noemail" style="display: none;" class="error" data-i18n="pair.noemail"></p>
      </div>
      <div class="homey-form-group">
        <label class="homey-form-label" for="password" data-i18n="pair.password">Password</label>
        <input class="homey-form-input" id="password" type="password" value="" />
        <p id="nopassword" style="display: none;" class="error" data-i18n="pair.nopassword"></p>
      </div>
    </fieldset>
    <p id="failed" style="display: none;" class="error" data-i18n="pair.failed">Something went wrong, did you enter the correct username and password?</p>
    <button id="save" class="homey-button-primary-full" data-i18n="pair.save">Save</button>
    <script type="text/javascript">
      const emailElement = document.getElementById('email');
      const passwordElement = document.getElementById('password');
      const errorElement = document.getElementById('failed');
      const noEmailElement = document.getElementById('noemail');
      const noPasswordElement = document.getElementById('nopassword');
      const saveElement = document.getElementById('save');
        saveElement.addEventListener("click", function (e) {
          errorElement.style.display = 'none';
          noEmailElement.style.display = 'none';
          noPasswordElement.style.display = 'none';
          if (!emailElement.value) {
            noEmailElement.style.display = 'block';
            setSave();
            return;
          }
          if (!passwordElement.value) {
            noPasswordElement.style.display = 'block';
            setSave();
            return;
          }
          setSaving();
          const email = emailElement.value;
          const password = passwordElement.value;
          Homey.emit("login", { email: email, password: password  }).then(function (result) {
            if (result === false) {
              errorElement.style.display = 'block';
              setSave();
            }
          });
        });
        function setSave() {
          saveElement.className = 'homey-button-primary-full';
          saveElement.textContent = Homey.__('pair.save');
        }

        function setSaving() {
          saveElement.className = 'homey-button-primary-full is-loading';
          saveElement.textContent = Homey.__('pair.saving');
        }
    </script>
  </body>
</html>
